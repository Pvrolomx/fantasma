<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#dc2626">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OBSERVATORIO">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSERVATORIO - Panel de Control de la Realidad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%); min-height: 100vh; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-red { background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3); }
        .glass-amber { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .score-ring { width:180px; height:180px; border-radius:50%; position:relative; display:flex; align-items:center; justify-content:center; }
        .score-ring::before { content:''; position:absolute; inset:0; border-radius:50%; padding:6px;
            background: conic-gradient(var(--ring-color,#22c55e) calc(var(--score,0)*1%), rgba(255,255,255,0.1) 0);
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #fff calc(100% - 5px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #fff calc(100% - 5px)); }
        .module-card { transition: all 0.3s; }
        .module-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="text-white p-4 md:p-6">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold">
                    <span class="text-red-500">&#x1F441;</span> OBSERVATORIO
                </h1>
                <p class="text-gray-400 text-sm">Panel de Control de la Realidad — Fantasma v2</p>
            </div>
            <div class="text-right">
                <div id="timestamp" class="text-xs text-gray-500 mono"></div>
                <button onclick="fetchScore()" class="mt-1 px-3 py-1 bg-white/10 rounded text-xs hover:bg-white/20">Actualizar</button>
            </div>
        </div>

        <!-- Protocolo 0 Banner -->
        <div id="protocolo-banner" class="hidden glass-red rounded-xl p-4 mb-6">
            <div class="flex items-center gap-3">
                <span class="text-2xl pulse">&#x26A0;</span>
                <div>
                    <div class="font-bold text-red-400">PROTOCOLO 0 ACTIVO</div>
                    <div id="protocolo-msg" class="text-sm text-red-300"></div>
                </div>
            </div>
            <div id="protocolo-alerts" class="mt-3 space-y-2"></div>
        </div>

        <!-- Main Score -->
        <div class="glass rounded-2xl p-6 mb-6 flex flex-col md:flex-row items-center gap-6">
            <div class="score-ring" id="score-ring">
                <div class="text-center">
                    <div id="score-value" class="text-4xl font-bold mono">--</div>
                    <div id="score-label" class="text-xs text-gray-400">SCORE</div>
                </div>
            </div>
            <div class="flex-1">
                <div id="alert-level" class="text-2xl font-bold mb-1">Cargando...</div>
                <div id="alert-action" class="text-gray-400 mb-3"></div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2" id="module-bars"></div>
            </div>
        </div>

        <!-- 4 Module Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <!-- Mod 1: Macro -->
            <div class="module-card glass rounded-xl p-4">
                <h3 class="font-bold text-amber-400 mb-3">&#x1F310; M1: Pulso Macro</h3>
                <div id="mod-core" class="space-y-2 text-sm"></div>
            </div>
            <!-- Mod 2: Ormuz -->
            <div class="module-card glass rounded-xl p-4">
                <h3 class="font-bold text-red-400 mb-3">&#x1F6E2; M2: Coreografia (Ormuz)</h3>
                <div id="mod-ormuz" class="space-y-2 text-sm"></div>
            </div>
            <!-- Mod 3: Mexico -->
            <div class="module-card glass rounded-xl p-4">
                <h3 class="font-bold text-green-400 mb-3">&#x1F1F2;&#x1F1FD; M3: Impacto Local</h3>
                <div id="mod-mexico" class="space-y-2 text-sm"></div>
            </div>
            <!-- Mod 4: Coherencia -->
            <div class="module-card glass rounded-xl p-4">
                <h3 class="font-bold text-purple-400 mb-3">&#x1F50D; Protocolo 0: Coherencia</h3>
                <div id="mod-protocolo" class="space-y-2 text-sm"></div>
            </div>
        </div>

        <!-- Active Signals -->
        <div class="glass rounded-xl p-4">
            <h3 class="font-bold text-gray-300 mb-3">Senales Activas</h3>
            <div id="active-signals" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2 text-sm"></div>
        </div>
    </div>

    <script>
    const API = window.location.origin + '/api';
    const COLORS = { BAJO:'#22c55e', MODERADO:'#eab308', ELEVADO:'#f97316', ALTO:'#ef4444', CRITICO:'#1f2937' };

    function signalRow(s) {
        if (s.error) return `<div class="flex justify-between text-gray-500"><span>${s.signal}</span><span>Error</span></div>`;
        const pct = s.max_score ? Math.round((s.score/s.max_score)*100) : 0;
        const color = pct > 60 ? 'text-red-400' : pct > 30 ? 'text-amber-400' : 'text-green-400';
        const val = s.value !== undefined ? s.value : s.brent || s.spread || '—';
        return `<div class="flex justify-between items-center">
            <span class="text-gray-300">${s.signal}</span>
            <div class="flex items-center gap-2">
                <span class="mono text-gray-400">${val}</span>
                <span class="mono font-bold ${color}">${s.score}/${s.max_score}</span>
            </div>
        </div>`;
    }

    function renderModuleBar(name, score, max) {
        const pct = Math.round((score/max)*100);
        const color = pct > 60 ? 'bg-red-500' : pct > 30 ? 'bg-amber-500' : 'bg-green-500';
        return `<div>
            <div class="text-xs text-gray-400 mb-1">${name}</div>
            <div class="w-full bg-white/10 rounded-full h-2">
                <div class="${color} h-2 rounded-full" style="width:${pct}%"></div>
            </div>
            <div class="text-xs mono text-gray-500 mt-0.5">${score}/${max}</div>
        </div>`;
    }

    async function fetchScore() {
        try {
            const res = await fetch(API + '/score');
            const d = await res.json();

            // Timestamp
            document.getElementById('timestamp').textContent = new Date(d.timestamp).toLocaleString('es-MX');

            // Score ring
            const ring = document.getElementById('score-ring');
            const color = COLORS[d.alert_level] || '#22c55e';
            ring.style.setProperty('--score', d.total_score);
            ring.style.setProperty('--ring-color', color);
            document.getElementById('score-value').textContent = d.total_score;
            document.getElementById('score-value').style.color = color;
            document.getElementById('alert-level').textContent = `${d.alert_emoji} ${d.alert_level}`;
            document.getElementById('alert-level').style.color = color;
            document.getElementById('alert-action').textContent = d.recommended_action;

            // Module bars
            const mods = d.modules;
            document.getElementById('module-bars').innerHTML = [
                renderModuleBar('Core MXN', mods.core_mxn.score, mods.core_mxn.max),
                renderModuleBar('Global', mods.global_overlay.score, mods.global_overlay.max),
                renderModuleBar('Ormuz', mods.ormuz_coreografia.score, mods.ormuz_coreografia.max),
                renderModuleBar('Mexico', mods.mexico_local.score, mods.mexico_local.max),
            ].join('');

            // Module cards
            document.getElementById('mod-core').innerHTML =
                [...mods.core_mxn.signals, ...mods.global_overlay.signals].map(signalRow).join('');
            document.getElementById('mod-ormuz').innerHTML =
                mods.ormuz_coreografia.signals.map(signalRow).join('');
            document.getElementById('mod-mexico').innerHTML =
                mods.mexico_local.signals.map(signalRow).join('');

            // Protocolo 0
            const p0 = d.protocolo_0;
            if (p0 && p0.protocolo_0_active) {
                document.getElementById('protocolo-banner').classList.remove('hidden');
                document.getElementById('protocolo-msg').textContent = p0.severity;
                document.getElementById('protocolo-alerts').innerHTML = p0.alerts.map(a =>
                    `<div class="glass-red rounded p-2 text-xs"><strong>${a.name}</strong>: ${a.message}</div>`
                ).join('');
            } else {
                document.getElementById('protocolo-banner').classList.add('hidden');
            }
            document.getElementById('mod-protocolo').innerHTML = p0
                ? `<div class="text-gray-400">Estado: ${p0.protocolo_0_active ? '<span class="text-red-400 font-bold">ACTIVO</span>' : '<span class="text-green-400">Normal</span>'}</div>
                   <div class="text-gray-500 text-xs">${p0.severity}</div>
                   <div class="text-gray-500 text-xs">Alertas: ${p0.alerts_count}</div>`
                : '<div class="text-gray-500">Sin datos</div>';

            // Active signals
            document.getElementById('active-signals').innerHTML = d.active_details.map(s =>
                `<div class="glass rounded p-2">${signalRow(s)}</div>`
            ).join('') || '<div class="text-gray-500">Sin senales activas</div>';

        } catch(e) {
            console.error('Error:', e);
            document.getElementById('alert-level').textContent = 'Error al cargar datos';
            document.getElementById('alert-action').textContent = e.message;
        }
    }

    // Auto-refresh every 5 minutes
    fetchScore();
    setInterval(fetchScore, 300000);
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
    </script>
</body>
</html>
