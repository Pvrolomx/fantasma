<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#dc2626">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="OBSERVATORIO">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OBSERVATORIO - Panel de Control de la Realidad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #0a0a1a 100%); min-height: 100vh; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-red { background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.3); }
        .glass-amber { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
        .score-ring { width:180px; height:180px; border-radius:50%; position:relative; display:flex; align-items:center; justify-content:center; }
        .score-ring::before { content:''; position:absolute; inset:0; border-radius:50%; padding:6px;
            background: conic-gradient(var(--ring-color,#22c55e) calc(var(--score,0)*1%), rgba(255,255,255,0.1) 0);
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #fff calc(100% - 5px));
            mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #fff calc(100% - 5px)); }
        .module-card { transition: all 0.3s; }
        .module-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="text-white p-4 md:p-6">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold">
                    <span class="text-red-500">&#x1F441;</span> OBSERVATORIO
                </h1>
                <p class="text-gray-400 text-sm">Panel de Control de la Realidad — Fantasma v2</p>
            </div>
            <div class="text-right">
                <div id="timestamp" class="text-xs text-gray-500 mono"></div>
                <button onclick="fetchScore()" class="mt-1 px-3 py-1 bg-white/10 rounded text-xs hover:bg-white/20">Actualizar</button>
                <button id="install-btn" onclick="installApp()" class="mt-1 px-3 py-1 bg-red-600/30 border border-red-500/50 rounded text-xs hover:bg-red-600/50 hidden">Instalar App</button>
            </div>
        </div>

        <!-- Protocolo 0 Banner -->
        <div id="protocolo-banner" class="hidden glass-red rounded-xl p-4 mb-6">
            <div class="flex items-center gap-3">
                <span class="text-2xl pulse">&#x26A0;</span>
                <div>
                    <div class="font-bold text-red-400">PROTOCOLO 0 ACTIVO</div>
                    <div id="protocolo-msg" class="text-sm text-red-300"></div>
                </div>
            </div>
            <div id="protocolo-alerts" class="mt-3 space-y-2"></div>
            <div id="manipulation-index" class="mt-3"></div>
        </div>

        <!-- Main Score -->
        <div class="glass rounded-2xl p-6 mb-6 flex flex-col md:flex-row items-center gap-6">
            <div class="score-ring" id="score-ring">
                <div class="text-center">
                    <div id="score-value" class="text-4xl font-bold mono">--</div>
                    <div id="score-label" class="text-xs text-gray-400">SCORE</div>
                </div>
            </div>
            <div class="flex-1">
                <div id="alert-level" class="text-2xl font-bold mb-1">Cargando...</div>
                <div id="alert-action" class="text-gray-400 mb-3"></div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-2" id="module-bars"></div>
            </div>
        </div>

        <!-- 4 Module Cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="module-card glass rounded-xl p-4">
                <h3 class="font-bold text-amber-400 mb-3">&#x1F310; M1: Pulso Macro</h3>
                <div id="mod-core" class="space-y-2 text-sm"></div>
            </div>
            <div class="module-card glass rounded-xl p-4">
                <h3 class="font-bold text-red-400 mb-3">&#x1F6E2; M2: Coreografia (Ormuz)</h3>
                <div id="mod-ormuz" class="space-y-2 text-sm"></div>
            </div>
            <div class="module-card glass rounded-xl p-4">
                <h3 class="font-bold text-green-400 mb-3">&#x1F1F2;&#x1F1FD; M3: Impacto Local</h3>
                <div id="mod-mexico" class="space-y-2 text-sm"></div>
            </div>
            <div class="module-card glass rounded-xl p-4">
                <h3 class="font-bold text-purple-400 mb-3">&#x1F50D; Protocolo 0: Coherencia</h3>
                <div id="mod-protocolo" class="space-y-2 text-sm"></div>
            </div>
        </div>

        <!-- Dias en Rojo -->
        <div class="glass rounded-xl p-4 mb-6" id="dias-rojo-section">
            <div class="flex items-center justify-between mb-3">
                <h3 class="font-bold text-red-300">&#x1F525; Dias en Rojo</h3>
                <span class="text-xs text-gray-500" id="dias-rojo-summary"></span>
            </div>
            <div id="dias-rojo-table" class="text-sm">
                <span class="text-gray-500">Cargando...</span>
            </div>
        </div>

        <!-- History Chart -->
        <div class="glass rounded-xl p-4 mb-6">
            <div class="flex items-center justify-between mb-3">
                <h3 class="font-bold text-gray-300">Evolucion Diaria</h3>
                <select id="history-days" onchange="fetchHistory()" class="bg-white/10 text-white text-xs rounded px-2 py-1 border border-white/20">
                    <option value="7">7 dias</option>
                    <option value="14">14 dias</option>
                    <option value="30" selected>30 dias</option>
                    <option value="90">90 dias</option>
                </select>
            </div>
            <div id="history-summary" class="text-sm mb-3"></div>
            <canvas id="historyChart" height="200"></canvas>
            <div id="history-table" class="mt-4 text-xs"></div>
        </div>

        <!-- Active Signals -->
        <div class="glass rounded-xl p-4">
            <h3 class="font-bold text-gray-300 mb-3">Senales Activas</h3>
            <div id="active-signals" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2 text-sm"></div>
        </div>
    </div>

    <script>
    // PWA Install prompt
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('install-btn').classList.remove('hidden');
    });
    function installApp() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(r => {
            if (r.outcome === 'accepted') document.getElementById('install-btn').classList.add('hidden');
            deferredPrompt = null;
        });
    }
    window.addEventListener('appinstalled', () => {
        document.getElementById('install-btn').classList.add('hidden');
    });

    const API = window.location.origin + '/api';
    const COLORS = { BAJO:'#22c55e', MODERADO:'#eab308', ELEVADO:'#f97316', ALTO:'#ef4444', CRITICO:'#1f2937' };

    const TIPS = {
        'C1_FIX': 'Tipo de cambio FIX de Banxico. Si sube >1.5% en un dia, hay presion sobre el peso.',
        'C2_TIIE': 'Tasa interbancaria a 28 dias. El costo del dinero en Mexico. Spread alto vs Fed = riesgo pais.',
        'C3_CFTC': 'Posiciones especulativas en el peso (futuros Chicago). Si los gringos apuestan contra el peso, mal signal.',
        'C4_RESERVAS': 'Reservas internacionales de Banxico. Si caen rapido, Banxico esta quemando balas para sostener el peso.',
        'C5_SPREAD': 'Diferencia entre lo que pagan bonos MX vs US. Mas amplio = Mexico tiene que pagar mas para atraer inversion.',
        'G1_VIX': 'Indice del miedo de Wall Street. >25 nervioso, >35 panico. Mide la volatilidad esperada del S&P 500.',
        'G2_DXY': 'Indice del dolar vs canasta de monedas. Si sube, el dolar se fortalece y las monedas emergentes sufren.',
        'G3_US10Y': 'Rendimiento del bono del Tesoro US a 10 anos. Sube = dinero sale de mercados emergentes hacia EEUU.',
        'G4_HY_SPREAD': 'Spread entre bonos basura y grado de inversion. Se amplia = el credito se encarece, estres corporativo.',
        'G5_COPPER': 'Precio del cobre. Proxy de la salud de China y la economia fisica global. Cae = desaceleracion.',
        'G6_GOOGLE_TRENDS': 'Busquedas de "crisis Mexico", "comprar dolares", etc. Mide el panico del mexicano promedio.',
        'G7_VOLATILITY': 'Volatilidad historica del peso (20 dias). Alta = mercado inestable, movimientos bruscos.',
        'O1_BRENT': 'Petroleo Brent. Termometro directo de Ormuz. Pre-guerra $65, ahora >$100. Cada dolar sube tu gasolina.',
        'O2_GAS_EU': 'Gas natural europeo (TTF). Qatar exporta via Ormuz. Si sube, Europa entra en crisis energetica.',
        'O3_USDCHF': 'Dolar vs Franco suizo. Si el CHF sube, el dinero real huye a Suiza. Refugio de ultima instancia.',
        'O4_SOFR': 'Tasa overnight de EEUU. Si sube de golpe, hay estres en la fontaneria financiera del sistema.',
        'O5_WAR_RISK': 'Spread Brent-WTI. Normal $2-4. Si pasa de $8, hay un "impuesto Ormuz" en cada barril del Golfo.',
        'M1_USDMXN': 'Tu tipo de cambio. Arriba de $20 es tu alarma. Cada peso que sube encarece todo lo importado.',
        'M2_CORN': 'Precio internacional del maiz. Mexico importa mucho. Si sube >10% mensual, la tortilla va a subir.',
        'M3_UREA': 'Fertilizantes (proxy: gas natural). Ormuz bloquea fertilizantes del Golfo. Sin fertilizante no hay cosecha.',
    };

    function showTip(signal) {
        const tip = TIPS[signal] || 'Sin descripcion disponible';
        document.getElementById('tip-title').textContent = signal;
        document.getElementById('tip-body').textContent = tip;
        const m = document.getElementById('tip-modal');
        m.classList.remove('hidden');
        m.classList.add('flex');
    }

    function signalRow(s) {
        if (s.error) return '<div class="flex justify-between text-gray-500"><span>' + s.signal + '</span><span>Error</span></div>';
        var pct = s.max_score ? Math.round((s.score/s.max_score)*100) : 0;
        var overflow = s.score > s.max_score;
        var color = overflow ? 'text-red-500 font-black' : pct > 60 ? 'text-red-400' : pct > 30 ? 'text-amber-400' : 'text-green-400';
        var val = s.value !== undefined ? s.value : s.brent || s.spread || '—';
        return '<div class="flex justify-between items-center">' +
            '<span class="text-gray-300 cursor-help border-b border-dotted border-gray-600" title="' + (TIPS[s.signal] || s.signal) + '" onclick="showTip(\'' + s.signal + '\')">' + s.signal + '</span>' +
            '<div class="flex items-center gap-2">' +
                '<span class="mono text-gray-400">' + val + '</span>' +
                '<span class="mono font-bold ' + color + '">' + s.score + '/' + s.max_score + '</span>' +
            '</div></div>';
    }

    function renderModuleBar(name, score, max) {
        var pct = Math.round((score/max)*100);
        var ovf = pct > 100;
        var color = ovf ? 'bg-red-600' : pct > 60 ? 'bg-red-500' : pct > 30 ? 'bg-amber-500' : 'bg-green-500';
        return '<div><div class="text-xs text-gray-400 mb-1">' + name + '</div>' +
            '<div class="w-full bg-white/10 rounded-full h-2"><div class="' + color + ' h-2 rounded-full" style="width:' + Math.min(pct,100) + '%"></div></div>' +
            '<div class="text-xs mono text-gray-500 mt-0.5">' + score + '/' + max + '</div></div>';
    }


    function renderManipulationIndex(p0) {
        var mi = p0.manipulation_index;
        if (!mi) return;
        var val = mi.value;
        var color = val > 25 ? '#ef4444' : val > 15 ? '#f97316' : val > 8 ? '#eab308' : '#22c55e';
        var label = val > 25 ? 'EXTREMO' : val > 15 ? 'ALTO' : val > 8 ? 'MEDIO' : 'BAJO';
        var bar = Math.min(val / 30 * 100, 100);
        var el = document.getElementById('manipulation-index');
        if (!el) return;
        el.innerHTML = '<div style="display:flex;align-items:center;gap:12px;">' +
            '<div style="flex:1;">' +
                '<div style="display:flex;justify-content:space-between;margin-bottom:4px;">' +
                    '<span style="font-size:12px;color:#9ca3af;">Indice de Manipulacion</span>' +
                    '<span style="font-size:12px;font-weight:bold;color:' + color + ';">' + label + '</span>' +
                '</div>' +
                '<div style="width:100%;background:rgba(255,255,255,0.1);border-radius:4px;height:8px;">' +
                    '<div style="width:' + bar + '%;background:' + color + ';height:8px;border-radius:4px;transition:width 0.5s;"></div>' +
                '</div>' +
                '<div style="display:flex;justify-content:space-between;margin-top:2px;font-size:10px;color:#6b7280;">' +
                    '<span>0</span><span>8</span><span>15</span><span>25+</span>' +
                '</div>' +
            '</div>' +
            '<div style="text-align:center;min-width:60px;">' +
                '<div class="mono" style="font-size:28px;font-weight:bold;color:' + color + ';">' + val + '</div>' +
            '</div>' +
        '</div>';
    }

    function renderDiasRojo(diasData) {
        if (!diasData || !diasData.signals) {
            document.getElementById('dias-rojo-table').innerHTML = '<span class="text-gray-500">Sin datos</span>';
            return;
        }
        var sum = diasData.summary || {};
        document.getElementById('dias-rojo-summary').textContent =
            sum.currently_red + '/' + sum.total_monitored + ' en rojo' +
            (sum.chronic_30d > 0 ? ' | ' + sum.chronic_30d + ' cronicas (>30d)' : '');
        var entries = Object.entries(diasData.signals).sort(function(a,b) { return b[1].consecutive_days - a[1].consecutive_days; });
        var rows = '';
        for (var i = 0; i < entries.length; i++) {
            var key = entries[i][0];
            var s = entries[i][1];
            var days = s.consecutive_days;
            var chronic = days >= 30;
            var isRed = s.is_red;
            var dotColor = isRed ? (chronic ? 'bg-red-600 pulse' : 'bg-red-500') : 'bg-gray-600';
            var textColor = isRed ? (chronic ? 'text-red-400 font-bold' : 'text-red-300') : 'text-gray-500';
            var daysText = days > 0 ? days + 'd' : '-';
            var val = (s.current_value !== null && s.current_value !== undefined) ? s.current_value : '-';
            var op = s.op === '>' ? '>' : '<';
            rows += '<div class="flex items-center justify-between py-1.5 border-b border-white/5">' +
                '<div class="flex items-center gap-2">' +
                '<div class="w-2 h-2 rounded-full ' + dotColor + '"></div>' +
                '<span class="text-gray-300 cursor-help" onclick="showTip(\'' + key + '\')">' + s.label + '</span></div>' +
                '<div class="flex items-center gap-4">' +
                '<span class="mono text-xs text-gray-400">' + val + ' <span class="text-gray-600">(' + op + s.threshold + ')</span></span>' +
                '<span class="mono font-bold ' + textColor + ' w-12 text-right">' + daysText + '</span>' +
                '</div></div>';
        }
        document.getElementById('dias-rojo-table').innerHTML = rows || '<span class="text-gray-500">Sin datos</span>';
    }

    async function fetchScore() {
        try {
            var res = await fetch(API + '/score');
            var d = await res.json();

            document.getElementById('timestamp').textContent = new Date(d.timestamp).toLocaleString('es-MX');

            var ring = document.getElementById('score-ring');
            var isOver100 = d.total_score > 100;
            var color = isOver100 ? '#7f1d1d' : (COLORS[d.alert_level] || '#22c55e');
            ring.style.setProperty('--score', d.total_score);
            ring.style.setProperty('--ring-color', color);
            document.getElementById('score-value').textContent = d.total_score;
            document.getElementById('score-value').style.color = color;
            document.getElementById('alert-level').textContent = d.alert_emoji + ' ' + d.alert_level;
            document.getElementById('alert-level').style.color = color;
            document.getElementById('alert-action').textContent = d.recommended_action;

            var mods = d.modules;
            document.getElementById('module-bars').innerHTML = [
                renderModuleBar('Core MXN', mods.core_mxn.score, mods.core_mxn.max),
                renderModuleBar('Global', mods.global_overlay.score, mods.global_overlay.max),
                renderModuleBar('Ormuz', mods.ormuz_coreografia.score, mods.ormuz_coreografia.max),
                renderModuleBar('Mexico', mods.mexico_local.score, mods.mexico_local.max),
            ].join('');

            document.getElementById('mod-core').innerHTML =
                [].concat(mods.core_mxn.signals, mods.global_overlay.signals).map(signalRow).join('');
            document.getElementById('mod-ormuz').innerHTML =
                mods.ormuz_coreografia.signals.map(signalRow).join('');
            document.getElementById('mod-mexico').innerHTML =
                mods.mexico_local.signals.map(signalRow).join('');

            // Protocolo 0
            var p0 = d.protocolo_0;
            if (p0 && p0.protocolo_0_active) {
                document.getElementById('protocolo-banner').classList.remove('hidden');
                document.getElementById('protocolo-msg').textContent = p0.severity;
                document.getElementById('protocolo-alerts').innerHTML = p0.alerts.map(function(a) {
                    return '<div class="glass-red rounded p-2 text-xs"><strong>' + a.name + '</strong>: ' + a.message + '</div>';
                }).join('');
            } else {
                document.getElementById('protocolo-banner').classList.add('hidden');
            }
            document.getElementById('mod-protocolo').innerHTML = p0
                ? '<div class="text-gray-400">Estado: ' + (p0.protocolo_0_active ? '<span class="text-red-400 font-bold">ACTIVO</span>' : '<span class="text-green-400">Normal</span>') + '</div>' +
                  '<div class="text-gray-500 text-xs">' + p0.severity + '</div>' +
                  '<div class="text-gray-500 text-xs">Alertas: ' + p0.alerts_count + '</div>'
                : '<div class="text-gray-500">Sin datos</div>';

            // Manipulation Index
            if (p0) renderManipulationIndex(p0);

            // Active signals
            document.getElementById('active-signals').innerHTML = d.active_details.map(function(s) {
                return '<div class="glass rounded p-2">' + signalRow(s) + '</div>';
            }).join('') || '<div class="text-gray-500">Sin senales activas</div>';

            // Dias en Rojo
            if (d.dias_rojo) renderDiasRojo(d.dias_rojo);

        } catch(e) {
            console.error('Error:', e);
            document.getElementById('alert-level').textContent = 'Error al cargar datos';
            document.getElementById('alert-action').textContent = e.message;
        }
    }

    fetchScore();
    setInterval(fetchScore, 300000);
    </script>

    <script>
    var historyChart = null;

    async function fetchHistory() {
        var days = document.getElementById('history-days').value;
        try {
            var res = await fetch(API + '/history?days=' + days);
            var d = await res.json();

            var sum = d.summary || {};
            var sumHtml = '';
            if (sum.change !== undefined && sum.change !== 0) {
                var arrow = sum.direction === 'up' ? '&#x2B06;' : '&#x2B07;';
                var color = sum.direction === 'up' ? 'text-red-400' : 'text-green-400';
                sumHtml = '<span class="' + color + '">' + arrow + ' ' + (sum.change > 0 ? '+' : '') + sum.change + ' pts vs ayer</span>';
            } else if (sum.change === 0 && sum.today) {
                sumHtml = '<span class="text-gray-400">Sin cambio vs ayer</span>';
            }
            document.getElementById('history-summary').innerHTML = sumHtml;

            var hist = d.history || [];
            if (hist.length === 0) {
                document.getElementById('history-table').innerHTML = '<span class="text-gray-500">Sin datos historicos aun. Se acumulan dia a dia.</span>';
                return;
            }

            var labels = hist.map(function(h) { return h.date.slice(5); });
            var scores = hist.map(function(h) { return h.total_score; });
            var ormuz = hist.map(function(h) { return (h.modules || {}).ormuz_coreografia || 0; });
            var mexico = hist.map(function(h) { return (h.modules || {}).mexico_local || 0; });

            if (historyChart) historyChart.destroy();
            var ctx = document.getElementById('historyChart').getContext('2d');
            historyChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Score Total', data: scores, borderColor: '#eab308', backgroundColor: 'rgba(234,179,8,0.1)', fill: true, tension: 0.3 },
                        { label: 'Ormuz', data: ormuz, borderColor: '#ef4444', borderDash: [5,3], tension: 0.3 },
                        { label: 'Mexico', data: mexico, borderColor: '#22c55e', borderDash: [5,3], tension: 0.3 },
                    ]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color: '#9ca3af', font: { size: 11 } } } },
                    scales: {
                        x: { ticks: { color: '#6b7280', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { ticks: { color: '#6b7280' }, grid: { color: 'rgba(255,255,255,0.05)' }, suggestedMin: 0 }
                    }
                }
            });

            var last5 = hist.slice(-5).reverse();
            var tbl = '<table class="w-full"><tr class="text-gray-500"><td>Fecha</td><td>Score</td><td>Nivel</td><td>Senales</td></tr>';
            last5.forEach(function(h) {
                var sc = h.total_score > 100 ? '<span class="text-red-500 font-bold">' + h.total_score + '</span>' : h.total_score;
                tbl += '<tr class="text-gray-400 border-t border-white/5"><td>' + h.date.slice(5) + '</td><td class="mono">' + sc + '</td><td>' + (h.alert_emoji||'') + ' ' + (h.alert_level||'') + '</td><td>' + (h.active_signals||0) + '</td></tr>';
            });
            tbl += '</table>';
            document.getElementById('history-table').innerHTML = tbl;

        } catch(e) {
            document.getElementById('history-table').innerHTML = '<span class="text-gray-500">Error cargando historial</span>';
        }
    }

    setTimeout(fetchHistory, 2000);

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(function(){});
    }
    </script>

    <!-- Tooltip Modal -->
    <div id="tip-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" style="background:rgba(0,0,0,0.7)" onclick="this.classList.add('hidden');this.classList.remove('flex')">
        <div class="glass rounded-xl p-5 max-w-sm w-full" onclick="event.stopPropagation()">
            <div id="tip-title" class="font-bold text-amber-400 mono mb-2"></div>
            <div id="tip-body" class="text-gray-300 text-sm leading-relaxed"></div>
            <button onclick="document.getElementById('tip-modal').classList.add('hidden');document.getElementById('tip-modal').classList.remove('flex')" class="mt-3 text-xs text-gray-500 hover:text-white">Cerrar</button>
        </div>
    </div>

</body>
